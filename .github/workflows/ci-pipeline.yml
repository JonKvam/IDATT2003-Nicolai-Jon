# This is a GitHub Actions workflow file for a Java project using Maven.
# Generated by Gemini AI
name: Java CI with Maven (Java 25)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ntnu-runners
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Maven
        run: |
          set -eo pipefail
          MAVEN_VERSION=3.9.15
          URL="https://downloads.apache.org/maven/maven-3/${MAVEN_VERSION}/binaries/apache-maven-${MAVEN_VERSION}-bin.tar.gz"
          curl -fsSL "$URL" -o maven.tar.gz
          tar -xzf maven.tar.gz
          MAVEN_HOME="${PWD}/apache-maven-${MAVEN_VERSION}"
          echo "${MAVEN_HOME}/bin" >> $GITHUB_PATH
          echo "MAVEN_HOME=${MAVEN_HOME}" >> $GITHUB_ENV

      - name: Build and Test
        run: mvn -B clean verify

      - name: Generate Site
        run: mvn site

      - name: Upload Everything
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: project-site
          path: target/site/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site
